// 승인/기록 가능한 학생 목록
function manageableStudents(approver, students) {
  if (!approver) return [];
  if (approver.role === "teacher" && approver.isHead) return students;           // 부장교사: 전체
  if (approver.role === "teacher") return students.filter(s => s.klass === approver.klass); // 담임: 자기 반
  if (approver.role === "parent") return students.filter(s => s.id === approver.childId);    // 학부모: 자기 자녀
  return [];
}
// 특정 학생을 승인할 수 있는가
function canApprove(approver, studentMember) {
  if (!approver || !studentMember) return false;
  if (approver.role === "teacher" && approver.isHead) return true;
  if (approver.role === "teacher") return !!approver.klass && approver.klass === studentMember.klass;
  if (approver.role === "parent") return approver.childId === studentMember.id;
  return false;
}

function compressImage(file, maxW=900, q=0.7){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q));};img.onerror=rej;img.src=e.target.result;};
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

function App() {
  const [users, setUsers] = useState(INITIAL_USERS);

  const [currentUser, setCurrentUser] = useState(null);
  const [toast, setToast] = useState(null);
  const [photoModal, setPhotoModal] = useState(null);

  const showToast = useCallback((msg, type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); },[]);

  const login = (userId, password)=>{
    const u = users.find(x=>x.id===userId && x.password===password);
    if(!u) return false;
    setCurrentUser(u); return true;
  };
  const logout = ()=>setCurrentUser(null);

  const addTransaction = (tx)=>{
    setTransactions(prev=>[...prev,{...tx,id:uid()}]);
    showToast(tx.status==="approved"?"달란트가 기록되었습니다 ✓":"신청이 제출되었습니다 ✓");
  };
  const updateTransaction = (id,patch)=>setTransactions(prev=>prev.map(t=>t.id===id?{...t,...patch}:t));

  const addStudent = (data)=>{
    const newId = uid();
    setUsers(prev=>[...prev,{...data,id:newId,role:"student"}]);
    setTransactions(prev=>[...prev,{...baseTx(newId),id:"base_"+newId}]);
    showToast("학생 등록 완료 · 기본 50달란트 지급 ✓");
  };
  const addTeacher = (data)=>{
    setUsers(prev=>[...prev,{...data,id:uid(),role:"teacher"}]);
    showToast("교사 등록 완료 ✓");
  };
  const addParent = (data)=>{
    setUsers(prev=>[...prev,{...data,id:uid(),role:"parent"}]);
    showToast("학부모 등록 완료 ✓");
  };
  const removeMember = (id)=>{
    setUsers(prev=>prev.filter(u=>u.id!==id));
    showToast("삭제되었습니다","error");
  };

  const students = users.filter(u=>u.role==="student");

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'Pretendard','Apple SD Gothic Neo',sans-serif" }}>
      {toast && <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background: toast.type==="success"?C.green:C.red, color:"#fff", padding:"10px 24px", borderRadius:8, zIndex:9999, fontWeight:600, fontSize:14, boxShadow:"0 4px 20px rgba(0,0,0,0.4)", maxWidth:"90%", textAlign:"center" }}>{toast.msg}</div>}
      {photoModal && <div onClick={()=>setPhotoModal(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:10000, display:"flex", alignItems:"center", justifyContent:"center", padding:20, cursor:"pointer" }}><img src={photoModal} alt="증빙 사진" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, border:`2px solid ${C.gold}` }} /></div>}

      <div style={{ background:C.amberBg, borderBottom:`1px solid ${C.amber}`, color:C.amber, fontSize:11, textAlign:"center", padding:"5px 12px" }}>
        🧪 데모 버전 — 새로고침 시 초기화됩니다. 실제 데이터 저장은 Supabase 운영 버전을 사용하세요.
      </div>

      {!currentUser && <LoginView users={users} login={login} />}

      {currentUser?.role==="teacher" && (
        <TeacherDashboard
          teacher={currentUser} allStudents={students} transactions={transactions}
          onApprove={(id)=>{ updateTransaction(id,{status:"approved",approvedBy:currentUser.id}); showToast("승인되었습니다 ✓"); }}
          onReject={(id)=>{ updateTransaction(id,{status:"rejected"}); showToast("반려되었습니다","error"); }}
          onDirectRecord={addTransaction} onAddStudent={addStudent}
          allUsers={users} onAddTeacher={addTeacher} onAddParent={addParent} onRemoveMember={removeMember}
          logout={logout} onPhotoClick={setPhotoModal}
        />
      )}
      {currentUser?.role==="parent" && (
        <ParentDashboard
          parent={currentUser} child={users.find(u=>u.id===currentUser.childId)}
          transactions={transactions.filter(t=>t.studentId===currentUser.childId)}
          onApprove={(id)=>{ updateTransaction(id,{status:"approved",approvedBy:currentUser.id}); showToast("승인되었습니다 ✓"); }}
          onReject={(id)=>{ updateTransaction(id,{status:"rejected"}); showToast("반려되었습니다","error"); }}
          logout={logout} onPhotoClick={setPhotoModal}
        />
      )}
      {currentUser?.role==="student" && (
        <StudentBook
          currentUser={currentUser} student={currentUser} allStudents={students} allTransactions={transactions}
          transactions={transactions.filter(t=>t.studentId===currentUser.id)}
          onApply={addTransaction} logout={logout} onPhotoClick={setPhotoModal}
        />
      )}
    </div>
  );
}

function PhotoInput({ photo, setPhoto }) {
  const [loading, setLoading] = useState(false);
  const handle = async (e)=>{ const f=e.target.files?.[0]; if(!f)return; setLoading(true); try{ setPhoto(await compressImage(f)); }catch{ setPhoto(null); } setLoading(false); };
  return (
    <div style={{ marginBottom:14 }}>
      <label style={labelStyle}>📷 증빙 사진 (스마트폰 촬영 / 갤러리)</label>
      {photo ? (
        <div style={{ position:"relative", display:"inline-block" }}>
          <img src={photo} alt="미리보기" style={{ width:"100%", maxWidth:220, borderRadius:10, border:`1px solid ${C.border}` }} />
          <button onClick={()=>setPhoto(null)} style={{ position:"absolute", top:6, right:6, background:C.red, color:"#fff", border:"none", borderRadius:"50%", width:26, height:26, cursor:"pointer", fontWeight:800, fontSize:14 }}>×</button>
        </div>
      ) : (
        <label style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:6, padding:"20px 0", background:C.surface, border:`1px dashed ${C.border}`, borderRadius:10, cursor:"pointer", color:C.textMid, fontSize:13 }}>
          {loading ? "사진 처리 중..." : "📸 사진 촬영 / 선택하기"}
          <input type="file" accept="image/*" capture="environment" onChange={handle} style={{ display:"none" }} />
        </label>
      )}
    </div>
  );
}

          “주께서 가라사대 지혜 있고 진실한 청지기가 되어 주인에게 그 집 종들을 맡아 때를 따라 양식을 나누어 줄 자가 누구냐”

        <div style={{ textAlign:"center", color:C.gold, fontSize:12, fontWeight:700, marginTop:10, letterSpacing:1 }}>— 누가복음 12:42 —</div>

          <label style={labelStyle}>아이디</label>
          <select value={userId} onChange={e=>{ setUserId(e.target.value); setError(""); }} style={{ ...inputStyle, marginBottom:16 }}>

          {error && <div style={{ color:C.red, fontSize:12, marginBottom:12 }}>{error}</div>}

          <div>부장교사: 김부장 부장교사 / 0000</div>
          <div>담임(사랑반): 다니엘 선생님 / 1234</div>
          <div>담임(소망반): 한나 선생님 / 5678</div>
          <div>학생: 김지은(사랑반) / 1111 · 이하은(소망반) / 3333</div>
          <div>학부모: 김지은 부모님 / 9999</div>
        </div>
      </div>
    </div>
  );
}

// ── 통장 카드 ────────────────────────────────
function BankCard({ student, balance }) {
  const tier=getTier(balance), next=getNextTier(balance);
  const prevMin=tier?tier.min:0, nextMin=next?next.min:1000;
  const seg=next?Math.min(((balance-prevMin)/(nextMin-prevMin))*100,100):100;
  return (
    <div style={{ background:"linear-gradient(135deg,#1A2F4F,#0F1D35)", border:`1px solid ${C.goldDim}`, borderRadius:16, padding:20 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div>
          <div style={{ fontSize:12, color:C.textDim }}>이름</div>
          <div style={{ fontSize:18, fontWeight:800, color:C.text, marginTop:2 }}>{student?.name}</div>
          <div style={{ fontSize:12, color:C.textMid, marginTop:2 }}>{student?.grade} · {student?.klass||student?.group}</div>
          {tier && <div style={{ display:"inline-block", marginTop:8, padding:"3px 10px", borderRadius:20, background:tier.color+"22", border:`1px solid ${tier.color}`, fontSize:12, fontWeight:800, color:tier.color }}>{tier.icon} {tier.label} 등급</div>}
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:11, color:C.textDim }}>현재 잔액</div>
          <div style={{ fontSize:36, fontWeight:900, color:C.gold, lineHeight:1.1 }}>{balance}<span style={{ fontSize:16, color:C.goldDim }}> T</span></div>
        </div>
      </div>
      <div style={{ marginTop:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:12, color:C.textMid }}>
          {next ? <><span>다음 등급 {next.icon} {next.label}까지</span><span style={{ color:C.goldL, fontWeight:700 }}>{Math.max(nextMin-balance,0)}T 남음</span></> : <span style={{ color:C.goldL, fontWeight:700 }}>👑 최고 등급 달성!</span>}
        </div>
        <div style={{ background:C.border, borderRadius:999, height:8, overflow:"hidden" }}>
          <div style={{ width:`${seg}%`, height:"100%", background:`linear-gradient(90deg, ${C.gold}, ${C.goldL})`, borderRadius:999, transition:"width 0.5s ease" }} />
        </div>
      </div>
    </div>
  );
}

// ── 보상 안내 ────────────────────────────────
function RewardLadder({ balance }) {
  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ fontWeight:700, color:C.gold, marginBottom:6 }}>🎁 선한 청지기 경주 보상 안내</div>
      <div style={{ fontSize:12, color:C.textDim, marginBottom:14 }}>목표 달란트에 도달하면 아래 보상이 지급됩니다. 끝까지 믿음의 경주를 완주해요!</div>
      {TIERS.map(t=>{
        const reached = balance!=null && balance>=t.min;
        return (
          <div key={t.key} style={{ background:C.card, border:`1px solid ${reached?t.color:C.border}`, borderLeft:`4px solid ${t.color}`, borderRadius:10, padding:"12px 14px", marginBottom:8, opacity:reached||balance==null?1:0.85 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:22 }}>{t.icon}</span><span style={{ fontWeight:800, fontSize:15, color:reached?t.color:C.text }}>{t.label}</span></div>
              <div style={{ fontWeight:900, fontSize:18, color:C.gold }}>{t.min}<span style={{ fontSize:11, color:C.goldDim }}>T</span></div>
            </div>
            <div style={{ fontSize:13, color:C.textMid, marginTop:6, paddingLeft:30 }}>🎀 {t.reward}</div>
            {reached && <div style={{ fontSize:11, color:C.green, marginTop:4, paddingLeft:30 }}>✓ 달성 완료</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── 전체 순위 ────────────────────────────────
function Leaderboard({ students, transactions, myId }) {
  const ranked = students.map(s=>({...s,balance:getBalance(s.id,transactions)})).sort((a,b)=>b.balance-a.balance);
  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ fontWeight:700, color:C.gold, marginBottom:6 }}>🏆 전체 청지기 통장 순위</div>
      <div style={{ fontSize:12, color:C.textDim, marginBottom:14 }}>함께 믿음의 진보를 향해 달려가는 친구들의 현황이에요. 서로 격려하며 선한 경쟁을 해요!</div>
      {ranked.map((s,i)=>{
        const tier=getTier(s.balance), isMe=s.id===myId;
        const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":null;
        return (
          <div key={s.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:isMe?C.blueBg:C.card, border:`1px solid ${isMe?C.blue:C.border}`, borderRadius:10, marginBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:30, textAlign:"center", fontWeight:900, fontSize:16, color:i<3?C.goldL:C.textDim }}>{medal||(i+1)}</div>
              <div><div style={{ fontWeight:700, fontSize:14 }}>{s.name}{isMe && <span style={{ color:C.blue, fontSize:11, marginLeft:6 }}>(나)</span>}</div><div style={{ fontSize:11, color:C.textDim }}>{s.grade} · {s.klass} · {tier?`${tier.icon} ${tier.label}`:"도전 중"}</div></div>
            </div>
            <div style={{ fontSize:20, fontWeight:900, color:C.gold }}>{s.balance}<span style={{ fontSize:12, color:C.goldDim }}>T</span></div>
          </div>
        );
      })}
    </div>
  );
}

// ── 학생 화면 ────────────────────────────────
function StudentBook({ currentUser, student, allStudents, allTransactions, transactions, onApply, logout, onPhotoClick }) {
  const [tab,setTab]=useState("book");
  const balance = transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount,0);
  return (
    <div style={{ maxWidth:480, margin:"0 auto", padding:"0 0 80px" }}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`무등교회 중고등부 · ${student.klass}`} logout={logout} />
      <div style={{ margin:"20px 16px" }}><BankCard student={student} balance={balance} /></div>
      <div style={{ display:"flex", gap:8, padding:"0 16px 16px", flexWrap:"wrap" }}>
        <TabBtn active={tab==="book"} onClick={()=>setTab("book")}>청지기 활동</TabBtn>
        <TabBtn active={tab==="apply"} onClick={()=>setTab("apply")}>입출금 신청</TabBtn>
        <TabBtn active={tab==="rank"} onClick={()=>setTab("rank")}>🏆 전체 순위</TabBtn>
        <TabBtn active={tab==="reward"} onClick={()=>setTab("reward")}>🎁 보상 안내</TabBtn>
      </div>
      {tab==="book" && <TransactionList transactions={transactions} showStatus onPhotoClick={onPhotoClick} />}
      {tab==="apply" && <ApplyForm studentId={currentUser.id} onApply={(tx)=>{ onApply(tx); setTab("book"); }} />}
      {tab==="rank" && <Leaderboard students={allStudents} transactions={allTransactions} myId={currentUser.id} />}
      {tab==="reward" && <RewardLadder balance={balance} />}
    </div>
  );
}

// ── 입·출금 신청 (학생) ──────────────────────
function ApplyForm({ studentId, onApply }) {
  const [type,setType]=useState("deposit");
  const [selectedId,setSelectedId]=useState("");
  const [customLabel,setCustomLabel]=useState("");
  const [customAmount,setCustomAmount]=useState("");
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [photo,setPhoto]=useState(null);

  const isDeposit=type==="deposit";
  const items=isDeposit?DEPOSIT_ITEMS:WITHDRAW_ITEMS;
  const selected=items.find(i=>i.id===selectedId);
  const isCustom=selected?.amount===null;
  const finalAmount=isCustom?(isDeposit?Math.abs(+customAmount):-Math.abs(+customAmount)):(selected?.amount??0);
  const categories=isDeposit?[...new Set(DEPOSIT_ITEMS.map(i=>i.category))]:null;
  const reset=()=>{ setSelectedId(""); setCustomLabel(""); setCustomAmount(""); setNote(""); setPhoto(null); };
  const switchType=(t)=>{ setType(t); reset(); };

  const submit=()=>{
    if(!selected || (isCustom && !customAmount)) return;
    onApply({ studentId, type, label:selected.label+(customLabel?` (${customLabel})`:""), amount:finalAmount, date, note, status:"pending", approvedBy:null, photo });
  };

  return (
    <div style={{ padding:"0 16px" }}>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16 }}>
        <div style={{ fontWeight:700, color:C.gold, marginBottom:14 }}>달란트 입·출금 신청</div>
        <label style={labelStyle}>신청 유형</label>
        <div style={{ display:"flex", gap:8, marginBottom:14 }}>
          {[["deposit","📥 입금 신청"],["withdraw","📤 출금 신청"]].map(([v,l])=>(
            <button key={v} onClick={()=>switchType(v)} style={{ flex:1, padding:"9px 0", borderRadius:7, fontWeight:700, fontSize:13, cursor:"pointer", background:type===v?(v==="deposit"?C.green:C.red):C.surface, border:`1px solid ${type===v?(v==="deposit"?C.green:C.red):C.border}`, color:type===v?"#fff":C.textMid }}>{l}</button>
          ))}
        </div>
        <label style={labelStyle}>{isDeposit?"실천 항목 선택":"출금 항목 선택"}</label>
        {isDeposit ? categories.map(cat=>(
          <div key={cat} style={{ marginBottom:8 }}>
            <div style={{ fontSize:11, color:C.textDim, marginBottom:4 }}>{cat}</div>
            {DEPOSIT_ITEMS.filter(i=>i.category===cat).map(item=>(
              <div key={item.id} onClick={()=>setSelectedId(item.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px", borderRadius:8, marginBottom:4, cursor:"pointer", background:selectedId===item.id?C.greenBg:C.surface, border:`1px solid ${selectedId===item.id?C.green:C.border}` }}>
                <span style={{ fontSize:13, color:C.text }}>{item.label}</span><span style={{ fontSize:14, fontWeight:800, color:C.green }}>+{item.amount}T</span>
              </div>
            ))}
          </div>
        )) : WITHDRAW_ITEMS.map(item=>(
          <div key={item.id} onClick={()=>setSelectedId(item.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px", borderRadius:8, marginBottom:4, cursor:"pointer", background:selectedId===item.id?C.redBg:C.surface, border:`1px solid ${selectedId===item.id?C.red:C.border}` }}>
            <span style={{ fontSize:13, color:C.text }}>{item.label}</span><span style={{ fontSize:14, fontWeight:800, color:C.red }}>{item.amount!=null?`${item.amount}T`:"직접 입력"}</span>
          </div>
        ))}
        {isCustom && (
          <div style={{ marginTop:8 }}>
            <label style={labelStyle}>세부 내용</label>
            <input value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder={isDeposit?"예: 봉사 활동":"예: 예배 중 소란"} style={{ ...inputStyle, marginBottom:8 }} />
            <label style={labelStyle}>{isDeposit?"추가 달란트 (숫자만)":"차감 달란트 (숫자만)"}</label>
            <input type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="예: 10" style={{ ...inputStyle, marginBottom:4 }} />
          </div>
        )}
        <label style={{ ...labelStyle, marginTop:12 }}>날짜</label>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ ...inputStyle, marginBottom:12 }} />
        <PhotoInput photo={photo} setPhoto={setPhoto} />
        <label style={labelStyle}>메모 (선택)</label>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 6월 14일 토요교제 간증" style={{ ...inputStyle, marginBottom:16 }} />
        {selected && !isCustom && (
          <div style={{ padding:"10px 14px", background:isDeposit?C.greenBg:C.redBg, borderRadius:8, marginBottom:14, fontSize:13 }}>
            <strong style={{ color:C.goldL }}>{selected.label}</strong> → <strong style={{ color:isDeposit?C.green:C.red }}>{isDeposit?"+":""}{selected.amount}T</strong>
            <div style={{ fontSize:11, color:C.textDim, marginTop:4 }}>담임교사·부장교사·학부모 승인 후 반영됩니다</div>
          </div>
        )}
        <button onClick={submit} disabled={!selected || (isCustom && !customAmount)} style={{ width:"100%", padding:"12px 0", background:(selected && !(isCustom && !customAmount))?`linear-gradient(135deg, ${isDeposit?C.green:C.red}, ${isDeposit?"#2A8A55":"#A83030"})`:C.border, color:"#fff", fontWeight:800, fontSize:15, border:"none", borderRadius:8, cursor:selected?"pointer":"not-allowed" }}>{isDeposit?"입금 신청하기":"출금 신청하기"}</button>
      </div>
    </div>
  );
}

// ── 청지기 활동 ────────────────────────────────
function TransactionList({ transactions, showStatus, onPhotoClick }) {
  const sorted=[...transactions].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return <div style={{ textAlign:"center", padding:"40px 20px", color:C.textDim, fontSize:14 }}>청지기 활동이 없습니다</div>;
  return (
    <div style={{ padding:"0 16px" }}>
      {sorted.map(t=>{
        const dep=t.amount>0;
        const sc=t.status==="approved"?C.green:t.status==="pending"?C.amber:C.red;
        const sl=t.status==="approved"?"승인":t.status==="pending"?"대기중":"반려";
        return (
          <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:C.card, border:`1px solid ${C.border}`, borderRadius:10, marginBottom:8 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, fontWeight:600, color:C.text }}>{t.label}</div>
              <div style={{ fontSize:11, color:C.textDim, marginTop:2 }}>{formatDate(t.date)}{t.note?` · ${t.note}`:""}</div>
              {showStatus && <div style={{ display:"inline-block", marginTop:4, fontSize:10, fontWeight:700, color:sc, background:sc+"22", padding:"2px 8px", borderRadius:4 }}>{sl}</div>}
            </div>
            <PhotoThumb photo={t.photo} onClick={onPhotoClick} />
            <div style={{ fontSize:18, fontWeight:900, color:dep?C.green:C.red, minWidth:64, textAlign:"right", marginLeft:8 }}>{dep?"+":""}{t.amount}T</div>
          </div>
        );
      })}
    </div>
  );
}

// ── 직접 입출금 (교사·학부모) ──────────────────
function DirectRecord({ students, lockedStudentId, recorderId, onRecord }) {
  const [studentId,setStudentId]=useState(lockedStudentId||"");
  const [type,setType]=useState("deposit");
  const [itemId,setItemId]=useState("");
  const [customLabel,setCustomLabel]=useState("");
  const [customAmount,setCustomAmount]=useState("");
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [photo,setPhoto]=useState(null);
  const [done,setDone]=useState(false);

  const items=type==="deposit"?DEPOSIT_ITEMS:WITHDRAW_ITEMS;
  const selected=items.find(i=>i.id===itemId);
  const isCustom=selected?.amount===null;
  const finalAmount=isCustom?(type==="deposit"?+customAmount:-Math.abs(+customAmount)):(selected?.amount??0);
  const reset=()=>{ setItemId(""); setCustomLabel(""); setCustomAmount(""); setNote(""); setPhoto(null); };

  const submit=()=>{
    const sid=lockedStudentId||studentId;
    if(!sid||!itemId||(isCustom&&!customAmount)) return;
    onRecord({ studentId:sid, type, label:selected.label+(customLabel?` (${customLabel})`:""), amount:finalAmount, date, note, status:"approved", approvedBy:recorderId, photo });
    setDone(true); setTimeout(()=>{ setDone(false); reset(); },1800);
  };

  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16 }}>
      <div style={{ fontWeight:700, color:C.gold, marginBottom:14 }}>✍️ 직접 입출금 기록 (즉시 반영)</div>
      {!lockedStudentId && (
        <>
          <label style={labelStyle}>학생 선택</label>
          <select value={studentId} onChange={e=>setStudentId(e.target.value)} style={{ ...inputStyle, marginBottom:12 }}>
            <option value="">-- 학생 선택 --</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.grade} · {s.klass})</option>)}
          </select>
        </>
      )}
      <label style={labelStyle}>유형</label>
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        {[["deposit","입금 (+)"],["withdraw","출금 (-)"]].map(([v,l])=>(
          <button key={v} onClick={()=>{ setType(v); setItemId(""); }} style={{ flex:1, padding:"8px 0", borderRadius:7, fontWeight:700, fontSize:13, cursor:"pointer", background:type===v?(v==="deposit"?C.green:C.red):C.surface, border:`1px solid ${type===v?(v==="deposit"?C.green:C.red):C.border}`, color:type===v?"#fff":C.textMid }}>{l}</button>
        ))}
      </div>
      <label style={labelStyle}>항목 선택</label>
      <select value={itemId} onChange={e=>setItemId(e.target.value)} style={{ ...inputStyle, marginBottom:12 }}>
        <option value="">-- 항목 선택 --</option>
        {items.map(i=><option key={i.id} value={i.id}>{i.label} {i.amount!=null?`(${i.amount>0?"+":""}${i.amount}T)`:"(직접 입력)"}</option>)}
      </select>
      {isCustom && (
        <>
          <label style={labelStyle}>세부 내용</label>
          <input value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder="예: 봉사 활동" style={{ ...inputStyle, marginBottom:8 }} />
          <label style={labelStyle}>달란트 수 (숫자만)</label>
          <input type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="예: 10" style={{ ...inputStyle, marginBottom:12 }} />
        </>
      )}
      <label style={labelStyle}>날짜</label>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ ...inputStyle, marginBottom:12 }} />
      <PhotoInput photo={photo} setPhoto={setPhoto} />
      <label style={labelStyle}>메모 (선택)</label>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="메모" style={{ ...inputStyle, marginBottom:16 }} />
      {selected && !isCustom && (
        <div style={{ padding:"10px 14px", background:type==="deposit"?C.greenBg:C.redBg, borderRadius:8, marginBottom:14, fontSize:13 }}>
          <strong>{selected.label}</strong> → <strong style={{ color:type==="deposit"?C.green:C.red }}>{finalAmount>0?"+":""}{finalAmount}T</strong>
        </div>
      )}
      <button onClick={submit} disabled={(!lockedStudentId&&!studentId)||!itemId||(isCustom&&!customAmount)} style={{ width:"100%", padding:"12px 0", background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`, color:done?"#fff":"#1A1200", fontWeight:800, fontSize:15, border:"none", borderRadius:8, cursor:"pointer" }}>{done?"✓ 기록 완료!":"즉시 기록"}</button>
    </div>
  );
}

// ── 승인 대기 목록 (권한 필터 적용) ────────────
function PendingApprovals({ transactions, students, allowedStudentIds, onApprove, onReject, onPhotoClick }) {
  const pending = transactions
    .filter(t=>t.status==="pending" && allowedStudentIds.includes(t.studentId))
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!pending.length) return <div style={{ textAlign:"center", padding:"40px 20px", color:C.textDim }}>승인할 대기 신청이 없습니다 ✓</div>;
  return (
    <div>
      <div style={{ fontSize:13, color:C.textMid, marginBottom:12 }}>총 {pending.length}건 승인 대기 중 (내 승인 권한 범위)</div>
      {pending.map(t=>{
        const st=students.find(s=>s.id===t.studentId);
        const dep=t.amount>0;
        return (
          <div key={t.id} style={{ background:C.card, border:`1px solid ${C.amberBg}`, borderLeft:`4px solid ${C.amber}`, borderRadius:10, padding:14, marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
              <div><div style={{ fontWeight:700, fontSize:15 }}>{st?.name} <span style={{ fontSize:11, color:C.textDim }}>· {st?.klass}</span> <span style={{ fontSize:11, color:dep?C.green:C.red }}>{dep?"입금 신청":"출금 신청"}</span></div><div style={{ fontSize:12, color:C.textDim }}>{formatDate(t.date)}</div></div>
              <div style={{ fontSize:20, fontWeight:900, color:dep?C.green:C.red }}>{dep?"+":""}{t.amount}T</div>
            </div>
            <div style={{ fontSize:13, color:C.text, marginBottom:t.note?4:0 }}>{t.label}</div>
            {t.note && <div style={{ fontSize:11, color:C.textDim }}>💬 {t.note}</div>}
            {t.photo && <img src={t.photo} alt="증빙" onClick={()=>onPhotoClick(t.photo)} style={{ marginTop:10, width:"100%", maxWidth:200, borderRadius:8, cursor:"pointer", border:`1px solid ${C.border}` }} />}
            <div style={{ display:"flex", gap:8, marginTop:12 }}>
              <button onClick={()=>onApprove(t.id)} style={{ flex:1, padding:"9px 0", background:C.green, color:"#fff", fontWeight:700, fontSize:13, border:"none", borderRadius:7, cursor:"pointer" }}>✓ 승인</button>
              <button onClick={()=>onReject(t.id)} style={{ flex:1, padding:"9px 0", background:C.redBg, color:C.red, fontWeight:700, fontSize:13, border:`1px solid ${C.red}`, borderRadius:7, cursor:"pointer" }}>✗ 반려</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── 학부모 ───────────────────────────────────
function ParentDashboard({ parent, child, transactions, onApprove, onReject, logout, onPhotoClick }) {
  const [tab,setTab]=useState("book");
  const balance=transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount,0);
  const familyPending = transactions.filter(t=>t.status==="pending" && isFamilyLife(t.label));
  const pendingCount = familyPending.length;
  return (
    <div style={{ maxWidth:480, margin:"0 auto", padding:"0 0 80px" }}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`${parent.name} · 학부모`} logout={logout} />
      <div style={{ margin:"20px 16px" }}><BankCard student={child} balance={balance} /></div>
      <div style={{ display:"flex", gap:8, padding:"0 16px 16px", flexWrap:"wrap" }}>
        <TabBtn active={tab==="book"} onClick={()=>setTab("book")}>청지기 활동</TabBtn>
        <TabBtn active={tab==="pending"} onClick={()=>setTab("pending")}>⏳ 승인 대기 {pendingCount>0?`(${pendingCount})`:""}</TabBtn>
        <TabBtn active={tab==="reward"} onClick={()=>setTab("reward")}>🎁 보상 안내</TabBtn>
      </div>
      {tab==="book" && <TransactionList transactions={transactions} showStatus onPhotoClick={onPhotoClick} />}
      {tab==="pending" && (
        <div style={{ padding:"0 16px" }}>
          <div style={{ padding:"10px 14px", background:C.purpleBg, border:`1px solid ${C.purple}`, borderRadius:8, fontSize:12, color:C.purple, marginBottom:12, lineHeight:1.6 }}>
            👨‍👩‍👧 자녀({child?.name})의 <strong>🏠 가정생활</strong> 항목만 승인/반려할 수 있습니다<br/>
            <span style={{ fontSize:11, color:C.textDim }}>· 입금: 집안일 돕기, 개인기도, 부모님 말씀 순종, 스마트폰 부모님께 맡기기<br/>· 출금: 부모님 말씀 불순종</span>
          </div>
          <PendingApprovals transactions={familyPending} students={child?[child]:[]} allowedStudentIds={child?[child.id]:[]} onApprove={onApprove} onReject={onReject} onPhotoClick={onPhotoClick} />
        </div>
      )}
      {tab==="reward" && <RewardLadder balance={balance} />}
    </div>
  );
}

// ── 교사 (부장/담임 공용, 권한 분기) ────────────
function TeacherDashboard({ teacher, allStudents, transactions, onApprove, onReject, onDirectRecord, onAddStudent, allUsers, onAddTeacher, onAddParent, onRemoveMember, logout, onPhotoClick }) {
  const [tab,setTab]=useState("overview");
  const [sel,setSel]=useState(null);

  const manageable = manageableStudents(teacher, allStudents);
  const allowedIds = manageable.map(s=>s.id);
  const pendingCount = transactions.filter(t=>t.status==="pending" && allowedIds.includes(t.studentId)).length;
  const scopeLabel = teacher.isHead ? "전체 학생" : `${teacher.klass} 담임`;

  // 부장교사만 교사·학부모 관리 메뉴 사용
  const tabs = [
    ["overview","📊 전체 현황"],
    ["pending",`⏳ 승인 대기 ${pendingCount>0?`(${pendingCount})`:""}`],
    ["record","✍️ 직접 기록"],
    ["reward","🎁 보상 안내"],
    ["manage","👥 학생 관리"],
  ];
  if (teacher.isHead) {
    tabs.push(["teachers","🧑‍🏫 교사 관리"]);
    tabs.push(["parents","👨‍👩‍👧 학부모 관리"]);
  }

  return (
    <div style={{ maxWidth:640, margin:"0 auto", paddingBottom:80 }}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`${teacher.isHead?"부장교사":"담임교사"} · ${scopeLabel}`} right={teacher.name} logout={logout} />
      <div style={{ display:"flex", gap:6, padding:"14px 16px 0", flexWrap:"wrap" }}>
        {tabs.map(([k,l])=>(
          <TabBtn key={k} active={tab===k} onClick={()=>{ setTab(k); setSel(null); }}>{l}</TabBtn>
        ))}
      </div>
      <div style={{ padding:"16px 16px 0" }}>
        {tab==="overview" && <TeacherOverview teacher={teacher} students={allStudents} manageableIds={allowedIds} transactions={transactions} onSelect={setSel} selectedStudent={sel} onPhotoClick={onPhotoClick} />}
        {tab==="pending"  && (
          <>
            <div style={{ padding:"10px 14px", background:C.blueBg, border:`1px solid ${C.blue}`, borderRadius:8, fontSize:12, color:C.blue, marginBottom:12 }}>
              {teacher.isHead ? "👑 부장교사 — 전체 학생의 신청을 승인/반려할 수 있습니다" : `🧑‍🏫 ${teacher.klass} 담임 — 우리 반 학생의 신청만 승인/반려할 수 있습니다`}
            </div>
            <PendingApprovals transactions={transactions} students={allStudents} allowedStudentIds={allowedIds} onApprove={onApprove} onReject={onReject} onPhotoClick={onPhotoClick} />
          </>
        )}
        {tab==="record"   && (
          <>
            <div style={{ padding:"10px 14px", background:C.blueBg, border:`1px solid ${C.blue}`, borderRadius:8, fontSize:12, color:C.blue, marginBottom:12 }}>
              기록 가능한 학생: <strong>{teacher.isHead ? "전체" : teacher.klass}</strong> ({manageable.length}명)
            </div>
            <DirectRecord students={manageable} recorderId={teacher.id} onRecord={onDirectRecord} />
          </>
        )}
        {tab==="reward"   && <RewardLadder balance={null} />}
        {tab==="manage"   && <StudentManage teacher={teacher} students={allStudents} onAdd={onAddStudent} />}
        {tab==="teachers" && <TeacherManage teachers={allUsers.filter(u=>u.role==="teacher")} onAdd={onAddTeacher} onRemove={onRemoveMember} meId={teacher.id} />}
        {tab==="parents"  && <ParentManage parents={allUsers.filter(u=>u.role==="parent")} students={allStudents} onAdd={onAddParent} onRemove={onRemoveMember} />}
      </div>
    </div>
  );
}

function TeacherOverview({ teacher, students, manageableIds, transactions, onSelect, selectedStudent, onPhotoClick }) {
  // 전체 현황은 선의의 경쟁을 위해 모든 학생을 보여줌 (담임/부장 공통)
  const ranked=students.map(s=>({...s,balance:getBalance(s.id,transactions)})).sort((a,b)=>b.balance-a.balance);
  const myScope=students.filter(s=>manageableIds.includes(s.id));
  const avg=Math.round(ranked.reduce((s,r)=>s+r.balance,0)/(students.length||1));
  const rewardCount=ranked.filter(r=>getTier(r.balance)).length;
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        <StatCard label={teacher.isHead?"전체 학생":"담당(우리 반)"} value={(teacher.isHead?students.length:myScope.length)+"명"} />
        <StatCard label="평균 달란트" value={avg+"T"} />
        <StatCard label="보상 등급 도달" value={rewardCount+"명"} color={C.green} />
        <StatCard label="내 승인 대기" value={transactions.filter(t=>t.status==="pending"&&manageableIds.includes(t.studentId)).length+"건"} color={C.amber} />
      </div>
      <div style={{ fontWeight:700, color:C.textMid, fontSize:13, marginBottom:10 }}>🏆 전체 달란트 현황 (순위)</div>
      {ranked.map((s,i)=>{
        const tier=getTier(s.balance),next=getNextTier(s.balance);
        const prevMin=tier?tier.min:0,nextMin=next?next.min:1000;
        const prog=next?Math.min(((s.balance-prevMin)/(nextMin-prevMin))*100,100):100;
        const isSel=selectedStudent?.id===s.id;
        const mine=manageableIds.includes(s.id);
        return (
          <div key={s.id} onClick={()=>onSelect(isSel?null:s)} style={{ background:isSel?C.blueBg:C.card, border:`1px solid ${isSel?C.blue:C.border}`, borderRadius:10, padding:"12px 14px", marginBottom:8, cursor:"pointer" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", background:i<3?C.goldDim:C.border, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:13, color:i<3?C.goldL:C.textDim }}>{i+1}</div>
                <div>
                  <div style={{ fontWeight:700, fontSize:14 }}>{s.name}{tier && <span style={{ marginLeft:6, fontSize:12 }}>{tier.icon}</span>}{mine && <span style={{ marginLeft:6, fontSize:10, color:C.blue, background:C.blueBg, padding:"1px 6px", borderRadius:4 }}>담당</span>}</div>
                  <div style={{ fontSize:11, color:C.textDim }}>{s.grade} · {s.klass} · {tier?tier.label:"도전 중"}</div>
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:20, fontWeight:900, color:C.gold }}>{s.balance}<span style={{ fontSize:12, color:C.goldDim }}>T</span></div>
                {next?<div style={{ fontSize:10, color:C.textDim }}>{next.icon}까지 {nextMin-s.balance}T</div>:<div style={{ fontSize:10, color:C.goldL }}>👑 최고 등급</div>}
              </div>
            </div>
            <div style={{ marginTop:8, background:C.border, borderRadius:999, height:5 }}><div style={{ width:`${prog}%`, height:"100%", background:`linear-gradient(90deg, ${C.gold}, ${C.goldL})`, borderRadius:999 }} /></div>
          </div>
        );
      })}
      {selectedStudent && (
        <div style={{ marginTop:12, background:C.card, border:`1px solid ${C.blue}`, borderRadius:12, padding:14 }}>
          <div style={{ fontWeight:700, color:C.blue, marginBottom:10 }}>{selectedStudent.name} ({selectedStudent.klass}) 청지기 활동</div>
          <TransactionList transactions={transactions.filter(t=>t.studentId===selectedStudent.id)} showStatus onPhotoClick={onPhotoClick} />
        </div>
      )}
    </div>
  );
}

function StudentManage({ teacher, students, onAdd }) {
  const [name,setName]=useState("");
  const [grade,setGrade]=useState("중1");
  const [klass,setKlass]=useState(teacher.klass || "");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);
  const grades=["중1","중2","중3","고1","고2","고3"];
  // 담임은 자기 반 학생만 조회, 부장은 전체
  const visible = teacher.isHead ? students : students.filter(s=>s.klass===teacher.klass);
  const submit=()=>{
    if(!name||!password||!klass) return;
    const group = grade.startsWith("중")?"중학부":"고등부";
    onAdd({ name, grade, klass, group, password });
    setName(""); setPassword(""); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  return (
    <div>
      <div style={{ fontWeight:700, color:C.textMid, fontSize:13, marginBottom:10 }}>
        {teacher.isHead ? "전체 학생" : `${teacher.klass} 학생`} ({visible.length}명)
      </div>
      {visible.map(s=>(
        <div key={s.id} style={{ display:"flex", justifyContent:"space-between", padding:"10px 14px", background:C.card, border:`1px solid ${C.border}`, borderRadius:9, marginBottom:7 }}>
          <div><span style={{ fontWeight:700 }}>{s.name}</span><span style={{ fontSize:12, color:C.textDim, marginLeft:8 }}>{s.grade} · {s.klass}</span></div>
          <span style={{ fontSize:12, color:C.textDim }}>비번: {s.password}</span>
        </div>
      ))}
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, marginTop:16 }}>
        <div style={{ fontWeight:700, color:C.gold, marginBottom:6 }}>➕ 학생 추가</div>
        <div style={{ fontSize:12, color:C.green, marginBottom:14 }}>🎁 등록 시 기본 달란트 50점이 자동 지급됩니다</div>
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="학생 이름" style={{ ...inputStyle, marginBottom:12 }} />
        <label style={labelStyle}>학년</label>
        <select value={grade} onChange={e=>setGrade(e.target.value)} style={{ ...inputStyle, marginBottom:12 }}>
          {grades.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <label style={labelStyle}>분반 (직접 입력)</label>
        <input value={klass} onChange={e=>setKlass(e.target.value)} placeholder="예: 사랑반, 소망반, 믿음반 ..." style={{ ...inputStyle, marginBottom:12 }} />
        <label style={labelStyle}>비밀번호 (학생 로그인용)</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{ ...inputStyle, marginBottom:16 }} />
        <button onClick={submit} disabled={!name||!password||!klass} style={{ width:"100%", padding:"11px 0", background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`, color:done?"#fff":"#1A1200", fontWeight:800, fontSize:14, border:"none", borderRadius:8, cursor:"pointer" }}>{done?"✓ 등록 완료!":"학생 등록"}</button>
      </div>
    </div>
  );
}

// ── 교사 관리 (부장교사 전용) ─────────────────
function TeacherManage({ teachers, onAdd, onRemove, meId }) {
  const [name,setName]=useState("");
  const [isHead,setIsHead]=useState(false);
  const [klass,setKlass]=useState("");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);
  const submit=()=>{
    if(!name||!password) return;
    if(!isHead && !klass) return;
    onAdd({ name, isHead, klass: isHead?null:klass, password, grade:null, group:"중고등부" });
    setName(""); setKlass(""); setPassword(""); setIsHead(false); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  return (
    <div>
      <div style={{ fontWeight:700, color:C.textMid, fontSize:13, marginBottom:10 }}>전체 교사 ({teachers.length}명)</div>
      {teachers.map(t=>(
        <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", background:C.card, border:`1px solid ${C.border}`, borderRadius:9, marginBottom:7 }}>
          <div>
            <span style={{ fontWeight:700 }}>{t.name}</span>
            <span style={{ fontSize:11, color:t.isHead?C.gold:C.textMid, marginLeft:8, fontWeight:700 }}>{t.isHead?"👑 부장교사":`담임 · ${t.klass||"-"}`}</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:12, color:C.textDim }}>비번: {t.password}</span>
            {t.id!==meId && <button onClick={()=>onRemove(t.id)} style={{ background:C.redBg, color:C.red, border:`1px solid ${C.red}`, borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>삭제</button>}
          </div>
        </div>
      ))}
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, marginTop:16 }}>
        <div style={{ fontWeight:700, color:C.gold, marginBottom:14 }}>➕ 교사 추가</div>
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="교사 이름" style={{ ...inputStyle, marginBottom:12 }} />
        <label style={labelStyle}>역할</label>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          {[["false","담임교사"],["true","부장교사(전체)"]].map(([v,l])=>(
            <button key={v} onClick={()=>setIsHead(v==="true")} style={{ flex:1, padding:"9px 0", borderRadius:7, fontWeight:700, fontSize:13, cursor:"pointer", background:(isHead===(v==="true"))?C.gold:C.surface, color:(isHead===(v==="true"))?"#1A1200":C.textMid, border:`1px solid ${(isHead===(v==="true"))?C.gold:C.border}` }}>{l}</button>
          ))}
        </div>
        {!isHead && (
          <>
            <label style={labelStyle}>담당 분반 (직접 입력)</label>
            <input value={klass} onChange={e=>setKlass(e.target.value)} placeholder="예: 사랑반" style={{ ...inputStyle, marginBottom:12 }} />
          </>
        )}
        <label style={labelStyle}>비밀번호 (교사 로그인용)</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{ ...inputStyle, marginBottom:16 }} />
        <button onClick={submit} disabled={!name||!password||(!isHead&&!klass)} style={{ width:"100%", padding:"11px 0", background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`, color:done?"#fff":"#1A1200", fontWeight:800, fontSize:14, border:"none", borderRadius:8, cursor:"pointer" }}>{done?"✓ 등록 완료!":"교사 등록"}</button>
      </div>
    </div>
  );
}

// ── 학부모 관리 (부장교사 전용) ───────────────
function ParentManage({ parents, students, onAdd, onRemove }) {
  const [name,setName]=useState("");
  const [childId,setChildId]=useState("");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);
  const childName=(id)=>students.find(s=>s.id===id)?.name||"미지정";
  const submit=()=>{
    if(!name||!password||!childId) return;
    onAdd({ name, childId, password });
    setName(""); setChildId(""); setPassword(""); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  return (
    <div>
      <div style={{ fontWeight:700, color:C.textMid, fontSize:13, marginBottom:10 }}>전체 학부모 ({parents.length}명)</div>
      {parents.map(p=>(
        <div key={p.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", background:C.card, border:`1px solid ${C.border}`, borderRadius:9, marginBottom:7 }}>
          <div>
            <span style={{ fontWeight:700 }}>{p.name}</span>
            <span style={{ fontSize:11, color:C.purple, marginLeft:8, fontWeight:700 }}>👨‍👩‍👧 자녀: {childName(p.childId)}</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:12, color:C.textDim }}>비번: {p.password}</span>
            <button onClick={()=>onRemove(p.id)} style={{ background:C.redBg, color:C.red, border:`1px solid ${C.red}`, borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>삭제</button>
          </div>
        </div>
      ))}
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, marginTop:16 }}>
        <div style={{ fontWeight:700, color:C.gold, marginBottom:14 }}>➕ 학부모 추가</div>
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="예: 홍길동 부모님" style={{ ...inputStyle, marginBottom:12 }} />
        <label style={labelStyle}>연결할 자녀 (학생)</label>
        <select value={childId} onChange={e=>setChildId(e.target.value)} style={{ ...inputStyle, marginBottom:12 }}>
          <option value="">-- 자녀 선택 --</option>
          {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.grade} · {s.klass})</option>)}
        </select>
        <label style={labelStyle}>비밀번호 (학부모 로그인용)</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{ ...inputStyle, marginBottom:16 }} />
        <button onClick={submit} disabled={!name||!password||!childId} style={{ width:"100%", padding:"11px 0", background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`, color:done?"#fff":"#1A1200", fontWeight:800, fontSize:14, border:"none", borderRadius:8, cursor:"pointer" }}>{done?"✓ 등록 완료!":"학부모 등록"}</button>
      </div>
    </div>
  );
}

// ── 공통 ─────────────────────────────────────
function TopBar({ title, subtitle, right, logout }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 20px", borderBottom:`1px solid ${C.border}` }}>
      <div><div style={{ fontSize:11, color:C.textDim }}>{subtitle}</div><div style={{ fontWeight:800, color:C.gold, fontSize:16 }}>{title}</div></div>
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>{right && <span style={{ fontSize:12, color:C.textMid }}>{right}</span>}<button onClick={logout} style={{ background:C.surface, border:`1px solid ${C.border}`, color:C.textMid, padding:"6px 12px", borderRadius:6, fontSize:12, cursor:"pointer" }}>로그아웃</button></div>
    </div>
  );
}
function TabBtn({ active, onClick, children }) {
  return <button onClick={onClick} style={{ padding:"7px 14px", borderRadius:20, fontWeight:700, fontSize:13, cursor:"pointer", background:active?C.gold:C.surface, color:active?"#1A1200":C.textMid, border:`1px solid ${active?C.gold:C.border}` }}>{children}</button>;
}
function StatCard({ label, value, color }) {
  return <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"12px 14px" }}><div style={{ fontSize:11, color:C.textDim, marginBottom:4 }}>{label}</div><div style={{ fontSize:22, fontWeight:900, color:color||C.gold }}>{value}</div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
